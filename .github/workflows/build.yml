name: Build Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        format: [apk, ipk]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: package-dir

      - name: Download ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/immortalwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          curl -sL "$SDK_URL" -o sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Copy package to SDK
        run: |
          mkdir -p sdk/package/luci-app-online-upgrade
          cp -r package-dir/* sdk/package/luci-app-online-upgrade/

      - name: Install zstd
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd

      - name: Build package (${{ matrix.format }})
        run: |
          cd sdk
          ./scripts/feeds update luci --depth 1
          ./scripts/feeds install -a
          make defconfig
          if [ "${{ matrix.format }}" = "apk" ]; then
            echo "CONFIG_USE_APK=y" >> .config
            make defconfig
          fi
          make -j$(nproc) package/luci-app-online-upgrade/compile V=s
        continue-on-error: true

      - name: Find and copy package (${{ matrix.format }})
        run: |
          mkdir -p /tmp/pkg/${{ matrix.format }}
          echo "=== Searching ==="
          find sdk/ -name "*online-upgrade*" -type f 2>/dev/null
          find sdk/ -name "*online-upgrade*.${{ matrix.format }}" -type f -exec cp {} /tmp/pkg/${{ matrix.format }}/ \; 2>/dev/null
          find sdk/ -name "*online-upgrade*" -type f -path "*/bin/*" -exec cp {} /tmp/pkg/${{ matrix.format }}/ \; 2>/dev/null
          ls -la /tmp/pkg/${{ matrix.format }}/ 2>/dev/null || echo "(empty)"

      - name: Upload ${{ matrix.format }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-online-upgrade-${{ matrix.format }}
          path: /tmp/pkg/${{ matrix.format }}/
          if-no-files-found: warn

      - name: Create Release (apk only)
        if: github.ref == 'refs/heads/main' && matrix.format == 'apk'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          PKG_FILE=$(ls /tmp/pkg/apk/luci-app-online-upgrade*.apk 2>/dev/null | head -1)
          if [ -n "$PKG_FILE" ]; then
            gh release create "$TAG" "$PKG_FILE" \
              --title "v1.0.${{ github.run_number }}" \
              --notes "自动编译的插件包" \
              --generate-notes || true
          fi
