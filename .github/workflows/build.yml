name: Build Package

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------- 1. 检出源码 ----------
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: package-dir

      # ---------- 2. 并行下载两个 SDK ----------
      - name: Download SDKs (parallel)
        run: |
          SDK23_URL="https://downloads.immortalwrt.org/releases/23.05.4/targets/x86/64/immortalwrt-sdk-23.05.4-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          SDK25_URL="https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/immortalwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          # 并行下载两个 SDK
          curl -sL --retry 5 --retry-delay 10 "$SDK23_URL" -o sdk23.tar.xz &
          curl -sL --retry 5 --retry-delay 10 "$SDK25_URL" -o sdk25.tar.zst &
          wait
          # 并行解压
          tar -xf sdk23.tar.xz && mv immortalwrt-sdk-* sdk23 &
          tar --zstd -xf sdk25.tar.zst && mv immortalwrt-sdk-* sdk25 &
          wait
          echo "✅ SDKs downloaded and extracted"

      # ============================================================
      # 编译 .ipk (opkg) - SDK 23.05
      # ============================================================
      - name: Copy package to SDK 23.05
        run: |
          mkdir -p sdk23/package/luci-app-online-upgrade
          cp -r package-dir/* sdk23/package/luci-app-online-upgrade/

      - name: Install feeds (SDK 23.05)
        run: |
          cd sdk23
          ./scripts/feeds update luci --depth 1
          ./scripts/feeds install -a
          make defconfig

      - name: Build .ipk
        id: build_ipk
        run: |
          cd sdk23
          make -j$(nproc) package/luci-app-online-upgrade/compile V=s
        continue-on-error: true

      - name: Save .ipk
        run: |
          mkdir -p /tmp/pkgs
          find sdk23/bin/ -name "luci-app-online-upgrade*.ipk" -exec cp {} /tmp/pkgs/ \;
          echo "=== .ipk artifacts ==="
          ls -lh /tmp/pkgs/*.ipk 2>/dev/null || echo "(no .ipk)"

      # ============================================================
      # 编译 .apk (APK) - SDK 25.12
      # ============================================================
      - name: Copy package to SDK 25.12
        run: |
          mkdir -p sdk25/package/luci-app-online-upgrade
          cp -r package-dir/* sdk25/package/luci-app-online-upgrade/

      - name: Install feeds (SDK 25.12)
        run: |
          cd sdk25
          ./scripts/feeds update luci --depth 1
          ./scripts/feeds install -a
          make defconfig

      - name: Build .apk
        id: build_apk
        run: |
          cd sdk25
          make -j$(nproc) package/luci-app-online-upgrade/compile V=s
        continue-on-error: true

      - name: Save .apk
        run: |
          find sdk25/bin/ -name "luci-app-online-upgrade*.apk" -exec cp {} /tmp/pkgs/ \;
          echo "=== All artifacts ==="
          ls -lh /tmp/pkgs/

      # ============================================================
      # 上传到 Release
      # ============================================================
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          body: |
            自动编译的插件包

            - ✅ .ipk (opkg) — 适用于 ImmortalWrt 23.05 及更早
            - ✅ .apk (APK) — 适用于 ImmortalWrt 25.12+
          files: /tmp/pkgs/*
          token: ${{ github.token }}
          make_latest: true
