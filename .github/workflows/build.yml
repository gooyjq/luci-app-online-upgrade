name: Build Package

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ---------- 1. 检出源码 ----------
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: package-dir

      # ---------- 2. 下载 ImmortalWrt SDK ----------
      - name: Download ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/immortalwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          curl -sL "$SDK_URL" -o sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      # ---------- 3. 把源码拷入 SDK ----------
      - name: Copy package to SDK
        run: |
          mkdir -p sdk/package/luci-app-online-upgrade
          cp -r package-dir/* sdk/package/luci-app-online-upgrade/

      # ---------- 4. 安装 SDK 必要的 feed ----------
      - name: Install feeds
        run: |
          cd sdk
          ./scripts/feeds update luci --depth 1
          ./scripts/feeds install -a
          make defconfig

      # ---------- 5. 第一次编译：生成 .ipk (opkg) ----------
      - name: Build .ipk (opkg)
        id: build_ipk
        run: |
          cd sdk
          # 切换为 opkg
          sed -i 's/CONFIG_USE_APK=y/# CONFIG_USE_APK is not set/' .config 2>/dev/null || true
          echo "CONFIG_USE_OPKG=y" >> .config
          make defconfig
          make -j$(nproc) package/luci-app-online-upgrade/compile V=s
        continue-on-error: true

      # ---------- 6. 保存 .ipk 文件 ----------
      - name: Save .ipk artifacts
        run: |
          mkdir -p /tmp/pkgs
          find sdk/bin/ -name "*.ipk" -exec cp {} /tmp/pkgs/ \;
          echo "=== .ipk artifacts ==="
          ls -lh /tmp/pkgs/ 2>/dev/null || echo "(none)"

      # ---------- 7. 清理 SDK 后重新编译：生成 .apk ----------
      - name: Build .apk (apk)
        id: build_apk
        run: |
          cd sdk
          # 完整清理，避免 opkg 产物干扰
          make clean 2>/dev/null || true
          # 切换为 apk
          echo "CONFIG_USE_APK=y" >> .config
          make defconfig
          make -j$(nproc) package/luci-app-online-upgrade/compile V=s
        continue-on-error: true

      # ---------- 8. 保存 .apk 文件 ----------
      - name: Save .apk artifacts
        run: |
          find sdk/bin/ -name "*.apk" -exec cp {} /tmp/pkgs/ \;
          echo "=== All artifacts ==="
          ls -lh /tmp/pkgs/

      # ---------- 9. 创建 Release 并上传 ipk + apk ----------
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: v1.0.${{ github.run_number }}
          body: |
            自动编译的插件包
            
            - ✅ .ipk (opkg)
            - ✅ .apk (APK)
            
            SDK: ImmortalWrt 25.12.0 x86_64
          files: /tmp/pkgs/*
          token: ${{ github.token }}
          make_latest: true
