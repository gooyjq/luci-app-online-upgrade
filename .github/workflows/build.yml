name: Build Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: package-dir

      - name: Download ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/immortalwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          curl -sL "$SDK_URL" -o sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk

      - name: Copy package to SDK
        run: |
          mkdir -p sdk/package/luci-app-online-upgrade
          cp -r package-dir/* sdk/package/luci-app-online-upgrade/

      - name: Install zstd
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd

      - name: Build .ipk
        run: |
          cd sdk
          ./scripts/feeds update luci --depth 1
          ./scripts/feeds install -a
          make defconfig
          make -j$(nproc) package/luci-app-online-upgrade/compile V=s
        continue-on-error: true

      - name: Save .ipk
        run: |
          mkdir -p /tmp/pkg
          find sdk/ -name "*.ipk" -path "*/luci-app-online-upgrade*" -exec cp {} /tmp/pkg/ \; 2>/dev/null

      - name: Build .apk
        run: |
          cd sdk
          echo "CONFIG_USE_APK=y" >> .config
          make defconfig
          make -j$(nproc) package/luci-app-online-upgrade/compile V=s
        continue-on-error: true

      - name: Save .apk
        run: |
          find sdk/ -name "*.apk" -path "*/luci-app-online-upgrade*" -exec cp {} /tmp/pkg/ \; 2>/dev/null
          ls -la /tmp/pkg/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-online-upgrade-packages
          path: /tmp/pkg/
          if-no-files-found: warn

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          FILES=$(ls /tmp/pkg/*.apk /tmp/pkg/*.ipk 2>/dev/null || true)
          if [ -n "$FILES" ]; then
            gh release create "$TAG" $FILES \
              --title "v1.0.${{ github.run_number }}" \
              --notes "自动编译的插件包（.apk + .ipk）" \
              --generate-notes || true
          fi
