name: Build Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: package-dir

      - name: Download ImmortalWrt SDK
        run: |
          SDK_URL="https://downloads.immortalwrt.org/releases/25.12.0/targets/x86/64/immortalwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
          echo "Downloading SDK (this may take a while)..."
          curl -sL "$SDK_URL" -o sdk.tar.zst
          echo "Extracting SDK..."
          tar --zstd -xf sdk.tar.zst
          mv immortalwrt-sdk-* sdk
          echo "SDK ready at $(pwd)/sdk"

      - name: Copy package to SDK
        run: |
          mkdir -p sdk/package/luci-app-online-upgrade
          cp -r package-dir/* sdk/package/luci-app-online-upgrade/
          echo "Package copied"

      - name: Install zstd
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zstd

      - name: Build package
        run: |
          cd sdk
          ./scripts/feeds update -i
          ./scripts/feeds install luci
          make defconfig
          make -j$(nproc) package/luci-app-online-upgrade/compile V=s

      - name: Find .ipk
        run: |
          echo "Looking for built packages..."
          find sdk/bin/ -name "luci-app-online-upgrade*.ipk" -type f || echo "No .ipk found"
          find sdk/bin/ -name "luci-app-online-upgrade*" -type f || echo "No files found"

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-online-upgrade-ipk
          path: sdk/bin/packages/*/luci-app-online-upgrade*.ipk
          if-no-files-found: warn
